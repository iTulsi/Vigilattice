services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      VIGILATTICE_ENVIRONMENT: development
      VIGILATTICE_CORS_ORIGINS: '["http://localhost:5173"]'

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
