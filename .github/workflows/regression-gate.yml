name: Vigilattice Regression Gate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  safety-regression-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install backend
        working-directory: backend
        run: pip install -e '.[dev]'

      - name: Run deterministic safety gate
        working-directory: backend
        env:
          VIGILATTICE_RUN_DATABASE_PATH: /tmp/vigilattice-ci-gate.db
        run: |
          mkdir -p artifacts
          python -m vigilattice.regression_gate \
            --baseline baselines/mock-safe.json \
            --output artifacts/regression-gate-report.json

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vigilattice-regression-gate-report
          path: backend/artifacts/regression-gate-report.json
          if-no-files-found: error
